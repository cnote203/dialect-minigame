<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dialect: Guess the Country</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌍 Dialect</h1>

    <div class="game-area">
      <!-- Left: Game UI -->
      <div class="main-panel">
        <div id="idiom" class="idiom-box">Idiom: </div>

        <div class="status-bar">
          <div id="score">Score: 0</div>
          <div id="guesses">Guesses Left: 4</div>
          <div id="feedback" class="feedback"></div>
        </div>

        <input type="text" id="guessInput" placeholder="Enter a country..." autocomplete="off">
        <button id="hintBtn">Use Hint</button>

        <div style="margin-top: 1rem;" class="nav-buttons">
          <button id="prevLevel">⬅️ Prev</button>
          <button id="nextLevel">Next ➡️</button>
        </div>

        <div id="hintBox" class="hint-area"></div>
      </div>

      <!-- Right: Previous Guesses -->
      <div class="sidebar">
        <h3>Previous Guesses</h3>
        <ul id="guessHistory"></ul>
      </div>
    </div>

    <!-- Below: Explanation Box aligned with sidebar -->
    <div class="sidebar" id="explanationBox"></div>
  </div>

  <script src="dialect-game.js"></script>
</body>
</html>
